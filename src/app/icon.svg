<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Keycap "G" — una tecla del teclado del hero, retroiluminada teal.
       Diseñada para leerse a 16px: G geométrica gorda, glow sutil. -->
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2440"/>
      <stop offset="1" stop-color="#090e1c"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#212e4e"/>
      <stop offset="1" stop-color="#0f1830"/>
    </linearGradient>
    <radialGradient id="backlight" cx="0.5" cy="0.5" r="0.62">
      <stop offset="0" stop-color="#3dddc4" stop-opacity="0.34"/>
      <stop offset="0.65" stop-color="#3dddc4" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#3dddc4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <!-- cuerpo de la keycap -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#base)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25" fill="none" stroke="#2a9184" stroke-opacity="0.55" stroke-width="1.5"/>
  <!-- cara superior desplazada hacia arriba: el borde inferior más grueso da el bisel 3D -->
  <rect x="7" y="6" width="50" height="48" rx="10" fill="url(#top)"/>
  <rect x="7.6" y="6.6" width="48.8" height="46.8" rx="9.4" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.2"/>
  <!-- retroiluminación -->
  <rect x="7" y="6" width="50" height="48" rx="10" fill="url(#backlight)"/>
  <!-- halo de la G -->
  <path d="M 37.9 19 A 12.5 12.5 0 1 0 44.5 30 L 35.5 30" fill="none" stroke="#3dddc4" stroke-width="9" stroke-linecap="round" filter="url(#soften)" opacity="0.65"/>
  <!-- G encendida -->
  <path d="M 37.9 19 A 12.5 12.5 0 1 0 44.5 30 L 35.5 30" fill="none" stroke="#5ff0da" stroke-width="7" stroke-linecap="round"/>
</svg>
